<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Recognition</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        h2 {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
        }

        h3 {
            font-size: 24px;
            margin-top: 20px;
            color: #2d3e50;
        }

        .container {
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .upload-section, .webcam-section {
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .upload-section input[type="file"] {
            display: inline-block;
            padding: 8px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .upload-section button, #startDetection {
            padding: 10px 20px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .upload-section button:hover, #startDetection:hover {
            background-color: #45a049;
        }

        #uploadedImage {
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .result {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .video-section {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            border-radius: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
   

    <div class="container">
        <!-- Upload Image Section -->
        <div class="upload-section">
            <h3>Upload Image for Detection</h3>
            <input type="file" id="fileUpload">
            <button onclick="uploadImage()">Upload & Detect</button>
            <h3>Detected Currency: <span id="uploadResult" class="result"></span></h3>
            <img id="uploadedImage" width="300" style="display: none;">
        </div>

        <hr>

        <!-- Live Webcam Detection Section -->
        <div class="webcam-section">
            <h3>Live Webcam Currency Detection</h3>
            <div class="video-section">
                <video id="video" width="400" height="300" autoplay></video>
            </div>
            <button id="startDetection">Start Live Detection</button>
            <h3>Live Detected Currency: <span id="liveResult" class="result"></span></h3>
        </div>
    </div>
    <script>
        // File Upload and Detection
        function uploadImage() {
            let fileInput = document.getElementById('fileUpload').files[0];
            if (!fileInput) {
                alert("Please select an image first!");
                return;
            }

            let formData = new FormData();
            formData.append('file', fileInput);

            $.ajax({
                url: '/upload',
                type: 'POST',
                data: formData,
                contentType: false,
                processData: false,
                success: function(response) {
                    document.getElementById('uploadResult').innerText = response.currency;
                    let uploadedImage = document.getElementById('uploadedImage');
                    uploadedImage.src = response.image_path;
                    uploadedImage.style.display = 'block';
                },
                error: function() {
                    alert("Error uploading image.");
                }
            });
        }

        // Access Webcam
        let video = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { console.error("Webcam access error:", err); });

        // Start Live Detection
        document.getElementById('startDetection').addEventListener('click', function () {
            let canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            let context = canvas.getContext('2d');

            setInterval(() => {
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                let imageData = canvas.toDataURL('image/jpeg');

                // Send frame to backend for detection
                $.post('/detect_live', { image: imageData }, function (response) {
                    document.getElementById('liveResult').innerText = response.currency;
                });
            }, 2000); // Capture every 2 seconds
        });
    </script>
</body>
</html>
